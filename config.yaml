# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
source: /home/venhuser/.config/skillshare/skills
agents_source: /home/venhuser/.config/skillshare/agents
extras_source: /home/venhuser/.config/skillshare/extras
mode: symlink
targets:
  antigravity:
    skills:
      path: /home/venhuser/.gemini/antigravity/skills
  claude:
    skills:
      path: /home/venhuser/.claude/skills
  codex:
    skills:
      path: /home/venhuser/.codex/skills
  copilot:
    skills:
      path: /home/venhuser/.copilot/skills
  gemini:
    skills:
      path: /home/venhuser/.gemini/skills
ignore:
  - '**/.DS_Store'
  - '**/.git/**'
audit:
  block_threshold: CRITICAL
